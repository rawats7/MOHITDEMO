<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>YAAR WIN </title>
    <style>
        /* … all previous styles remain identical … */
        :root {
            --neon-red: #ff003c;
            --neon-gold: #FFD700;
            --dark-bg: #1a0005;
            --body-gradient: linear-gradient(135deg, #33000b 0%, #1a0005 50%, #0a0002 100%);

            background: #0a0002;

        #iframeContainer {
            position: fixed;
            top: 0;
            left: 0;

        .login-card {

        .login-card::before {
            content: '';

            top: -14px;
            left: 50%;
            transform: translateX(-50%);

            height: 16px;

            border: 1.5px solid var(--neon-red);

            box-shadow: 0 -4px 10px rgba(255, 0, 60, 0.3);

        .login-card::after {
            content: '';

        .login-brand {
            font-weight: 900;
            font-size: 14px;
            color: var(--neon-gold);

            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;

        }
        .input-group label {
            font-size: 9px;
            font-weight: 700;
            color: var(--neon-gold);
            letter-spacing: 1px;
            text-shadow: 0 0 6px rgba(255, 215, 0, 0.4);
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .input-group input {
            width: 100%;
            padding: 11px 14px;
            background: #0a0002;
            border: 1.5px solid rgba(255, 0, 60, 0.5);
            border-radius: 10px;
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.25s;
            box-shadow: inset 0 0 10px rgba(255, 0, 60, 0.15);
        }
        .input-group input:focus {
            border-color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.4), inset 0 0 15px rgba(255, 0, 60, 0.25);
        }
        .input-group input::placeholder {
            color: #555;
            letter-spacing: 0px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(180deg, #1a0005, #000);
            border: 1.5px solid #4d0012;
            border-top: 2px solid #ff4d79;
            border-radius: 10px;
            color: var(--neon-gold);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
            transition: all 0.2s;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.6);
            margin-top: 6px;

            color: #fff;
            border-color: var(--neon-red);

        /* floating mini button */
        #miniBtn {
            width: 60px;
            height: 60px;
            background: var(--body-gradient);

            border: 2px solid var(--neon-red);

        .header {
            display: flex;
            justify-content: space-between;

        .brand-title {

        .watch-btn {

        .watch-btn:active {
            transform: scale(0.95);
            background: var(--neon-red);
            color: #fff;
            border-color: var(--neon-red);

        .btn-tg {
            flex: 1;
            background: rgba(255, 0, 60, 0.1);
            border: 1px solid #ff003c;
            border-top: 1.5px solid #ff4d79;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            box-shadow: inset 0 0 10px rgba(255, 0, 60, 0.2);
            touch-action: manipulation;
        }
        .btn-tg svg {
            width: 16px;
            height: 16px;
            fill: var(--neon-gold);
            filter: drop-shadow(0 0 5px var(--neon-gold));
            pointer-events: none;
        }
        .btn-tg:active {
            transform: scale(0.92);
            background: var(--neon-red);
        }
        .btn-tg:active svg {
            fill: #fff;
            filter: none;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes floatPulse {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes horizontalScan {
            0% { left: -10%; }
            100% { left: 110%; }
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(4px); }
        }
        .blink { animation: blinker 1s step-end infinite; }

        @media (max-width: 380px) {
            #main { width: 220px; padding: 10px; border-radius: 16px; }
            #main::before, #main::after { width: 70px; height: 14px; }
            #main::before { top: -12px; }
            #main::after { bottom: -12px; }
            .display-bezel { height: 90px; }
            .res-big { font-size: 20px; }
            .brand-title { font-size: 10px; }
            .btn-wrap { height: 28px; gap: 4px; }
            .watch-btn { font-size: 9px; }
            #miniBtn { width: 50px; height: 50px; }
            .login-card { padding: 22px 16px; }
            .login-brand { font-size: 12px; }
        }
        @media (min-width: 768px) {
            #main { width: 260px; }
            .display-bezel { height: 115px; }
            .res-big { font-size: 26px; }
            #miniBtn { width: 65px; height: 65px; }
        }
    </style>
</head>

    <script>
        (function() {
            const VALID_USERNAME = 'mohit';
            const VALID_PASSWORD = 'mohit';
            const TARGET_URL = 'https://yaarwin.org/#/register?invitationCode=75314887711';
            const API_URL = 'https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=';

            const loginOverlay = document.getElementById('loginOverlay');
            const usernameInput = document.getElementById('usernameInput');
            const passwordInput = document.getElementById('passwordInput');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const iframeContainer = document.getElementById('iframeContainer');
            const targetIframe = document.getElementById('targetIframe');
            const miniBtn = document.getElementById('miniBtn');
            const mainPanel = document.getElementById('main');
            const dragHeader = document.getElementById('dragHeader');
            const clsBtn = document.getElementById('cls-btn');
            const innerScreen = document.getElementById('innerScreen');
            const btnArea1 = document.getElementById('btnArea1');
            const btnArea2 = document.getElementById('btnArea2');

            let isLoggedIn = false;
            let isScanning = false;
            let lastAutoPeriod = '';
            let mainPanelDragged = false;
            let storedMainPos = { left: null, top: null };

            let miniPos = { left: null, top: null };
            let mainPos = { left: null, top: null };

            function initMiniPosition() {
                const size = miniBtn.offsetWidth || 60;
                const margin = 16;
                miniPos.left = window.innerWidth - size - margin;
                miniPos.top = window.innerHeight - size - margin - 20;
                clampPosition(miniPos, size, size);
                applyMiniPosition();
            }

            function applyMiniPosition() {
                miniBtn.style.left = miniPos.left + 'px';
                miniBtn.style.top = miniPos.top + 'px';
                miniBtn.style.right = 'auto';
                miniBtn.style.bottom = 'auto';
            }

            function clampPosition(pos, elWidth, elHeight) {
                const maxLeft = window.innerWidth - elWidth;
                const maxTop = window.innerHeight - elHeight;
                pos.left = Math.max(0, Math.min(pos.left, maxLeft));
                pos.top = Math.max(0, Math.min(pos.top, maxTop));
            }

            function centerMainPanel() {
                const panelWidth = mainPanel.offsetWidth || 240;
                const panelHeight = mainPanel.offsetHeight || 250;
                mainPos.left = (window.innerWidth - panelWidth) / 2;
                mainPos.top = (window.innerHeight - panelHeight) / 2;
                clampPosition(mainPos, panelWidth, panelHeight);
                applyMainPosition();
            }

            function applyMainPosition() {
                mainPanel.style.left = mainPos.left + 'px';
                mainPanel.style.top = mainPos.top + 'px';
                mainPanel.style.transform = 'none';
            }

            function applyMainCentered() {
                mainPanel.style.left = '50%';
                mainPanel.style.top = '50%';
                mainPanel.style.transform = 'translate(-50%, -50%)';
            }

            // Draggable logic (unchanged)
            function makeDraggable(dragHandle, targetEl, posRef, onDragStart, onDrag, onDragEnd) {
                let dragging = false;
                let startX, startY, origLeft, origTop;
                let totalMove = 0;
                const DRAG_THRESHOLD = 4;

                function getClientX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }
                function getClientY(e) { return e.touches ? e.touches[0].clientY : e.clientY; }

                function onStart(e) {
                    dragging = true;
                    totalMove = 0;
                    const rect = targetEl.getBoundingClientRect();
                    origLeft = rect.left;
                    origTop = rect.top;
                    startX = getClientX(e);
                    startY = getClientY(e);
                    targetEl.classList.add(targetEl === mainPanel ? 'dragging-panel' : 'dragging');
                    if (targetEl === mainPanel) {
                        targetEl.style.transform = 'none';
                        targetEl.style.left = origLeft + 'px';
                        targetEl.style.top = origTop + 'px';
                        mainPos.left = origLeft;
                        mainPos.top = origTop;
                    }
                    if (targetEl === miniBtn && miniBtn.style.animation) {
                        miniBtn.style.animation = 'none';
                    }
                    if (onDragStart) onDragStart();
                    e.preventDefault();
                }

                function onMove(e) {
                    if (!dragging) return;
                    const dx = getClientX(e) - startX;
                    const dy = getClientY(e) - startY;
                    totalMove = Math.abs(dx) + Math.abs(dy);
                    let newLeft = origLeft + dx;
                    let newTop = origTop + dy;
                    const elWidth = targetEl.offsetWidth;
                    const elHeight = targetEl.offsetHeight;
                    newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - elWidth));
                    newTop = Math.max(0, Math.min(newTop, window.innerHeight - elHeight));
                    targetEl.style.left = newLeft + 'px';
                    targetEl.style.top = newTop + 'px';
                    targetEl.style.transform = 'none';
                    posRef.left = newLeft;
                    posRef.top = newTop;
                    if (targetEl === mainPanel) {
                        mainPanelDragged = true;
                        storedMainPos.left = newLeft;
                        storedMainPos.top = newTop;
                    }
                    if (onDrag) onDrag(newLeft, newTop);
                }

                function onEnd(e) {
                    if (!dragging) return;
                    dragging = false;
                    targetEl.classList.remove('dragging-panel', 'dragging');
                    if (targetEl === miniBtn) {
                        miniBtn.style.animation = 'floatPulse 3s ease-in-out infinite';
                    }
                    if (onDragEnd) onDragEnd(totalMove < DRAG_THRESHOLD);
                    if (totalMove < DRAG_THRESHOLD) {
                        return true; // click
                    }
                    return false;
                }

                dragHandle.addEventListener('mousedown', function(e) {
                    if (e.target === clsBtn) return;
                    onStart(e);
                });
                document.addEventListener('mousemove', function(e) {
                    if (dragging) { onMove(e); e.preventDefault(); }
                });
                document.addEventListener('mouseup', function(e) {
                    if (dragging) {
                        const wasClick = onEnd(e);
                        if (wasClick && targetEl === miniBtn && totalMove < DRAG_THRESHOLD) {
                            toggleWidget();
                        }
                    }
                });

                dragHandle.addEventListener('touchstart', function(e) {
                    if (e.target === clsBtn) return;
                    onStart(e);
                }, { passive: false });
                document.addEventListener('touchmove', function(e) {
                    if (dragging) { onMove(e); e.preventDefault(); }
                }, { passive: false });
                document.addEventListener('touchend', function(e) {
                    if (dragging) {
                        const wasClick = onEnd(e);
                        if (wasClick && targetEl === miniBtn && totalMove < DRAG_THRESHOLD) {
                            toggleWidget();
                        }
                    }
                });
            }

            makeDraggable(miniBtn, miniBtn, miniPos);
            makeDraggable(dragHeader, mainPanel, mainPos);

            // ---------- TOGGLE LOGIC (THE FIX) ----------
            function toggleWidget() {
                if (!isLoggedIn) return;
                // If main panel is currently displayed, hide it and show circle
                if (mainPanel.style.display === 'flex') {
                    closeMainPanel();
                } else {
                    openMainPanel();
                }
            }

            function openMainPanel() {
                if (!isLoggedIn) return;
                // Save current mini button position (it will be hidden)
                if (mainPanelDragged && storedMainPos.left !== null) {
                    mainPos.left = storedMainPos.left;
                    mainPos.top = storedMainPos.top;
                    clampPosition(mainPos, mainPanel.offsetWidth || 240, mainPanel.offsetHeight || 250);
                    applyMainPosition();
                } else {
                    applyMainCentered();

                mainPanel.style.display = 'flex';
                mainPanel.style.animation = 'none';
                mainPanel.offsetHeight;
                mainPanel.style.animation = 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
                // Hide the mini circle
                miniBtn.classList.remove('visible');
                renderMainScreen();
                isScanning = false;
            }

            function closeMainPanel() {
                const rect = mainPanel.getBoundingClientRect();
                storedMainPos.left = rect.left;
                storedMainPos.top = rect.top;
                mainPanelDragged = true;
                mainPanel.style.display = 'none';
                mainPanel.style.animation = 'none';
                // Show the mini circle again
                miniBtn.classList.add('visible');
                // Reapply animation
                miniBtn.style.animation = 'floatPulse 3s ease-in-out infinite';

            // ---------- RENDER MAIN SCREEN ----------
            function renderMainScreen() {
                innerScreen.innerHTML = `

                btnArea2.innerHTML = `

            // ---------- HACK & API ----------
            async function fetchLiveResult() {
                const response = await fetch(API_URL + Date.now(), { cache: 'no-store' });
                const data = await response.json();
                let list = [];
                if (Array.isArray(data?.data?.list)) list = data.data.list;
                else if (Array.isArray(data?.data)) list = data.data;
                else if (Array.isArray(data?.list)) list = data.list;
                else if (Array.isArray(data?.rows)) list = data.rows;
                else if (Array.isArray(data?.data?.records)) list = data.data.records;
                if (!list.length) throw new Error('No data');
                list.sort((a, b) => String(b.issueNumber || b.period || '').localeCompare(String(a.issueNumber || a.period || '')));
                const latest = list[0];
                let period = String(latest.issueNumber || latest.issue || latest.period || latest.periodNo || latest.Id || '');
                let rawNum = '';
                if (latest.number !== undefined && latest.number !== null) rawNum = String(latest.number);
                else if (latest.result !== undefined && latest.result !== null) rawNum = String(latest.result);
                else if (latest.openCode !== undefined && latest.openCode !== null) rawNum = String(latest.openCode);
                else if (latest.open !== undefined && latest.open !== null) rawNum = String(latest.open);
                else if (latest.code !== undefined && latest.code !== null) rawNum = String(latest.code);
                if (!period || rawNum === '') throw new Error('Incomplete data');
                const num = parseInt(rawNum, 10);
                let resultText = '';
                if (!isNaN(num)) {
                    const type = (num >= 5) ? 'BIG' : 'SMALL';
                    resultText = `${type} ${num}`;
                } else {
                    resultText = rawNum;
                }
                return { period, result: resultText, rawNumber: rawNum };
            }

                    miniBtn.classList.add('visible');

                    usernameInput.focus();

                mainPanel.style.display = 'none';
                mainPanel.style.transform = 'translate(-50%, -50%)';
                mainPanel.style.left = '50%';
                mainPanel.style.top = '50%';
            }
            init();
            console.log('🚀 DANGER x PYTHON | Toggle fixed: tap circle → panel, close → circle');
